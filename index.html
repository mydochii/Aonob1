<script>
const adLink = "https://otieu.com/4/10005133";

function openAd() {
  const win = window.open(adLink, "_blank");
  if(!win || win.closed || typeof win.closed === "undefined"){
    window.location.href = adLink;
  }
}

// Tangani semua video
document.querySelectorAll("video").forEach(video => {
  // Simpan src di data-src, kosongkan src supaya tidak autoplay
  const src = video.getAttribute("data-src");
  video.removeAttribute("src");

  video.addEventListener("click", function(){
    // Set src dan mainkan video
    video.src = src;
    video.play();

    // Buka iklan pertama
    openAd();

    // Iklan kedua setelah 20 detik
    setTimeout(openAd, 20000);
  });
});
</script>
